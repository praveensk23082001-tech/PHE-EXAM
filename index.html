<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHE MCQ Exam – March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2128;
  --border:#30363d;
  --accent:#00c896;
  --accent2:#0ea5e9;
  --danger:#f87171;
  --warn:#fbbf24;
  --text:#e6edf3;
  --muted:#7d8590;
  --radius:12px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── COVER ── */
#cover{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;position:relative;overflow:hidden;
}
#cover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,200,150,0.12),transparent),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(14,165,233,0.10),transparent);
  pointer-events:none;
}
.cover-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 16px;
  background:rgba(0,200,150,0.1);border:1px solid rgba(0,200,150,0.3);
  border-radius:999px;font-size:12px;color:var(--accent);font-weight:500;
  letter-spacing:0.05em;margin-bottom:2rem;
}
.cover-badge span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:1rem}
h1 span{color:var(--accent)}
.cover-sub{font-size:1.05rem;color:var(--muted);margin-bottom:0.5rem}
.cover-meta{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:2rem 0;
}
.meta-pill{
  padding:8px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:999px;font-size:13px;color:var(--muted);
}
.meta-pill strong{color:var(--text)}
.name-row{display:flex;gap:12px;align-items:center;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
#nameInput{
  padding:12px 20px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);font-family:'Sora',sans-serif;font-size:15px;
  color:var(--text);outline:none;width:280px;transition:border-color .2s;
}
#nameInput:focus{border-color:var(--accent)}
#nameInput::placeholder{color:var(--muted)}
.btn{
  padding:13px 32px;background:var(--accent);color:#0d1117;border:none;
  border-radius:var(--radius);font-family:'Sora',sans-serif;font-size:15px;
  font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:0.02em;
}
.btn:hover{background:#00e6ad;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}

/* ── EXAM ── */
#exam{display:none;max-width:860px;margin:0 auto;padding:1.5rem}
.exam-header{
  position:sticky;top:0;z-index:100;background:var(--bg);
  border-bottom:1px solid var(--border);padding:1rem 0;margin-bottom:2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.exam-title{font-size:14px;font-weight:600;color:var(--muted)}
.exam-title strong{color:var(--text)}
.timer{
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:500;
  color:var(--accent);background:rgba(0,200,150,0.08);
  padding:8px 18px;border-radius:999px;border:1px solid rgba(0,200,150,0.2);
}
.timer.warn{color:var(--warn);background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.2)}
.timer.danger{color:var(--danger);background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2);animation:timerShake .5s infinite}
@keyframes timerShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.progress-bar{width:100%;height:3px;background:var(--surface2);border-radius:999px;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s ease}
.q-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:2rem;margin-bottom:1.5rem;transition:border-color .2s;
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-card:hover{border-color:#444c56}
.q-num{
  font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--accent);
  text-transform:uppercase;margin-bottom:12px;font-family:'JetBrains Mono',monospace;
}
.q-text{font-size:16px;font-weight:500;line-height:1.6;margin-bottom:1.5rem;color:var(--text)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:flex-start;gap:14px;padding:14px 18px;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;
}
.opt:hover{border-color:var(--accent2);background:rgba(14,165,233,0.05)}
.opt.selected{border-color:var(--accent2);background:rgba(14,165,233,0.08)}
.opt-label{
  min-width:28px;height:28px;border-radius:8px;
  background:var(--border);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0;font-family:'JetBrains Mono',monospace;
  transition:all .15s;
}
.opt.selected .opt-label{background:var(--accent2);color:#fff}
.opt-text{font-size:14px;line-height:1.5;padding-top:4px;color:var(--text)}
.nav-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:2rem 0;flex-wrap:wrap;gap:12px;
}
.answered-count{font-size:13px;color:var(--muted)}
.answered-count strong{color:var(--text)}
.btn-submit{
  padding:13px 36px;background:var(--accent);color:#0d1117;border:none;
  border-radius:var(--radius);font-family:'Sora',sans-serif;font-size:15px;
  font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-submit:hover{background:#00e6ad;transform:translateY(-1px)}

/* ── RESULTS ── */
#results{display:none;max-width:720px;margin:0 auto;padding:2rem}
.score-hero{
  text-align:center;padding:3rem 2rem;background:var(--surface);
  border:1px solid var(--border);border-radius:20px;margin-bottom:2rem;
  position:relative;overflow:hidden;
}
.score-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,200,150,0.08),transparent);
}
.score-ring{
  width:140px;height:140px;border-radius:50%;
  border:6px solid var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:0 auto 1.5rem;
  position:relative;
}
.score-ring-fill{
  position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(var(--accent) var(--pct),var(--surface2) 0);
  mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 6px));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 6px));
}
.score-num{font-size:2.5rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.score-total{font-size:13px;color:var(--muted);margin-top:4px}
.score-grade{font-size:1.5rem;font-weight:700;margin-bottom:0.5rem}
.score-name{font-size:15px;color:var(--muted)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem;text-align:center;
}
.stat-val{font-size:1.8rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-val.correct{color:var(--accent)}
.stat-val.wrong{color:var(--danger)}
.stat-val.skip{color:var(--warn)}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.review-title{font-size:16px;font-weight:600;margin-bottom:1rem;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;font-size:12px}
.r-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem 1.5rem;margin-bottom:10px;
}
.r-q{font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.5}
.r-opts{display:flex;flex-direction:column;gap:6px}
.r-opt{
  padding:8px 12px;border-radius:8px;font-size:13px;border:1px solid transparent;
}
.r-opt.correct-ans{background:rgba(0,200,150,0.08);border-color:rgba(0,200,150,0.3);color:var(--accent)}
.r-opt.wrong-ans{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.3);color:var(--danger)}
.r-opt.neutral{color:var(--muted)}
.retry-btn{
  display:block;width:100%;padding:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  font-family:'Sora',sans-serif;font-size:14px;font-weight:600;
  color:var(--text);cursor:pointer;margin-top:1rem;transition:all .2s;
  text-align:center;
}
.retry-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-badge"><span></span> Public Health Engineering</div>
  <h1>PHE <span>MCQ</span> Exam</h1>
  <p class="cover-sub">March 2026 &nbsp;|&nbsp; Professional Assessment</p>
  <div class="cover-meta">
    <div class="meta-pill"><strong>150</strong> Questions</div>
    <div class="meta-pill"><strong>150</strong> Marks</div>
    <div class="meta-pill"><strong>90</strong> Minutes</div>
    <div class="meta-pill"><strong>1</strong> Mark Each</div>
  </div>
  <div class="name-row">
    <input id="nameInput" type="text" placeholder="Enter your full name" maxlength="60"/>
    <button class="btn" id="startBtn" onclick="startExam()" disabled>Start Exam</button>
  </div>
  <p style="font-size:12px;color:var(--muted)">Enter your name to begin &nbsp;·&nbsp; Do not refresh during the exam</p>
</div>

<!-- EXAM -->
<div id="exam">
  <div class="exam-header">
    <div>
      <div class="exam-title"><strong id="headerName">Candidate</strong> &nbsp;·&nbsp; PHE MCQ Exam</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="timer" id="timer">90:00</div>

  <div id="questionsContainer"></div>
  <div class="nav-bar">
    <div class="answered-count">Answered: <strong id="answeredCount">0</strong> / 150</div>
    <button class="btn-submit" onclick="confirmSubmit()">Submit Exam</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results"></div>

const DURATION = 90 * 60;
let userName = '';
let answers = {};
let timerInterval;
let timeLeft = DURATION;
let examStarted = false;

document.getElementById('nameInput').addEventListener('input', function(){
  document.getElementById('startBtn').disabled = this.value.trim().length < 2;
});
document.getElementById('nameInput').addEventListener('keydown', function(e){
  if(e.key==='Enter' && this.value.trim().length>=2) startExam();
});

function startExam(){
  userName = document.getElementById('nameInput').value.trim();
  if(!userName) return;
  document.getElementById('cover').style.display='none';
  document.getElementById('exam').style.display='block';
  document.getElementById('headerName').textContent = userName;
  renderQuestions();
  startTimer();
  examStarted = true;
}

function renderQuestions(){
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  QUESTIONS.forEach((q,i)=>{
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q'+i;
    const labels = ['A','B','C','D'];
    const optsHtml = q.opts.map((opt,j)=>`
      <div class="opt ${answers[i]===j?'selected':''}" onclick="selectAnswer(${i},${j})" id="opt-${i}-${j}">
        <div class="opt-label">${labels[j]}</div>
        <div class="opt-text">${opt}</div>
      </div>`).join('');
    card.innerHTML = `
      <div class="q-num">Question ${q.no} of 150</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>`;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx){
  answers[qIdx] = optIdx;
  document.querySelectorAll(`[id^="opt-${qIdx}-"]`).forEach((el,j)=>{
    el.classList.toggle('selected', j===optIdx);
    el.querySelector('.opt-label').style.background = j===optIdx ? 'var(--accent2)' : '';
    el.querySelector('.opt-label').style.color = j===optIdx ? '#fff' : '';
  });
  const count = Object.keys(answers).length;
  document.getElementById('answeredCount').textContent = count;
  document.getElementById('progressFill').style.width = (count/150*100)+'%';
}

function startTimer(){
  timerInterval = setInterval(()=>{
    timeLeft--;
    const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
    const s = (timeLeft%60).toString().padStart(2,'0');
    const el = document.getElementById('timer');
    el.textContent = m+':'+s;
    if(timeLeft<=300){ el.className='timer warn'; }
    if(timeLeft<=60){ el.className='timer danger'; }
    if(timeLeft<=0){ clearInterval(timerInterval); submitExam(); }
  },1000);
}

function confirmSubmit(){
  const answered = Object.keys(answers).length;
  const unanswered = 150 - answered;
  if(unanswered>0){
    if(!confirm(`You have ${unanswered} unanswered question(s).\nSubmit anyway?`)) return;
  }
  clearInterval(timerInterval);
  submitExam();
}

function submitExam(){
  document.getElementById('exam').style.display='none';
  document.getElementById('results').style.display='block';
  showResults();
}

function showResults(){
  let correct=0, wrong=0, skipped=0;
  QUESTIONS.forEach((q,i)=>{
    if(answers[i]===undefined) skipped++;
    else if(answers[i]===q.ans) correct++;
    else wrong++;
  });
  const pct = Math.round(correct/150*100);
  let grade, gradeColor;
  if(pct>=90){grade='Outstanding';gradeColor='var(--accent)';}
  else if(pct>=75){grade='Distinction';gradeColor='#6ee7b7';}
  else if(pct>=60){grade='Pass';gradeColor='var(--accent2)';}
  else if(pct>=50){grade='Average';gradeColor='var(--warn)';}
  else{grade='Needs Improvement';gradeColor='var(--danger)';}

  const timeTaken = DURATION - timeLeft;
  const mins = Math.floor(timeTaken/60);
  const secs = timeTaken%60;

  const reviewHtml = QUESTIONS.map((q,i)=>{
    const userAns = answers[i];
    const isCorrect = userAns===q.ans;
    const isSkipped = userAns===undefined;
    const labels=['A','B','C','D'];
    const badge = isSkipped?'<span style="color:var(--warn);font-size:11px">⏭ Skipped</span>':
                  isCorrect?'<span style="color:var(--accent);font-size:11px">✓ Correct</span>':
                  '<span style="color:var(--danger);font-size:11px">✗ Wrong</span>';
    const optsHtml = q.opts.map((opt,j)=>{
      let cls='neutral';
      if(j===q.ans) cls='correct-ans';
      else if(j===userAns && !isCorrect) cls='wrong-ans';
      else cls='neutral';
      return `<div class="r-opt ${cls}">${labels[j]}. ${opt}${j===q.ans?' ✓':''}${j===userAns&&!isCorrect?' ✗':''}</div>`;
    }).join('');
    return `<div class="r-card">
      <div class="r-q"><strong style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:11px">Q${q.no}</strong> ${badge}<br/>${q.q}</div>
      <div class="r-opts">${optsHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="score-hero">
      <div class="score-ring" style="--pct:${pct*3.6}deg">
        <div class="score-ring-fill"></div>
        <div class="score-num">${correct}</div>
        <div class="score-total">out of 150</div>
      </div>
      <div class="score-grade" style="color:${gradeColor}">${grade}</div>
      <div class="score-name">${userName} &nbsp;·&nbsp; ${pct}% Score</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">Time taken: ${mins}m ${secs}s</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val correct">${correct}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-card"><div class="stat-val wrong">${wrong}</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat-card"><div class="stat-val skip">${skipped}</div><div class="stat-lbl">Skipped</div></div>
    </div>
    <div class="review-title">Answer Review</div>
    ${reviewHtml}
    <button class="retry-btn" onclick="location.reload()">Retake Exam</button>
  `;
}
</script>
</body>
</html>
